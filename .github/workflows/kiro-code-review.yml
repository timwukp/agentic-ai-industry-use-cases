name: Kiro Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  kiro-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Kiro CLI
        run: |
          curl -fsSL https://cli.kiro.dev/install | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Kiro CLI
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          kiro-cli --version

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr-diff.txt
          echo "Diff size: $(wc -l < /tmp/pr-diff.txt) lines"

      - name: Kiro Review — Security
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          DIFF=$(cat /tmp/pr-diff.txt | head -500)
          kiro-cli chat --no-interactive --trust-tools=read,grep \
            "You are a senior security reviewer. Here is the PR diff:

          $DIFF

          Review for: 1) Hardcoded secrets or API keys 2) Input validation gaps 3) Unsafe deserialization or injection risks 4) Missing error handling that could leak sensitive info 5) AWS credential handling issues. Format as a concise markdown report with severity levels." \
            > /tmp/review-security.md 2>&1 || true
          cat /tmp/review-security.md

      - name: Kiro Review — Code Quality
        env:
          KIRO_API_KEY: ${{ secrets.KIRO_API_KEY }}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          DIFF=$(cat /tmp/pr-diff.txt | head -500)
          kiro-cli chat --no-interactive --trust-tools=read,grep \
            "You are a senior code reviewer. Here is the PR diff:

          $DIFF

          Review for: 1) Bugs or logic errors 2) Code style inconsistencies 3) Missing error handling 4) Performance concerns 5) Suggestions for improvement. Be concise, only comment on real issues." \
            > /tmp/review-quality.md 2>&1 || true
          cat /tmp/review-quality.md

      - name: Post review as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let security = 'Review not available';
            let quality = 'Review not available';
            try { security = fs.readFileSync('/tmp/review-security.md', 'utf8'); } catch(e) {}
            try { quality = fs.readFileSync('/tmp/review-quality.md', 'utf8'); } catch(e) {}
            const body = `## 🤖 Kiro Automated Code Review\n\n### 🔒 Security Review\n${security}\n\n### 📝 Code Quality Review\n${quality}\n\n---\n*Powered by [Kiro CLI](https://kiro.dev) headless mode*`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
